<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta -->
    <title>BFStock - Blox Fruits Stock Tracker</title>
    <meta name="description" content="Theo dõi trái ác quỷ đang bán trong Blox Fruits theo thời gian thực. Cập nhật mỗi 4 tiếng tự động.">
    <meta name="theme-color" content="#05070a">

    <!-- Open Graph / Discord / Zalo -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bfstock.pages.dev/">
    <meta property="og:title" content="BFStock - Blox Fruits Stock Tracker">
    <meta property="og:description" content="Xem ngay trái ác quỷ đang bán trong shop Blox Fruits. Cập nhật tự động mỗi 4 tiếng.">
    <meta property="og:image" content="https://bfstock.pages.dev/assets/fruits/Dragon.webp">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.2);
            --text: #ffffff;
            --muted: #94a3b8;
            --common: #9ca3af;
            --uncommon: #4ade80;
            --rare: #60a5fa;
            --legendary: #c084fc;
            --mythical: #f87171;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }

        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse 80% 50% at 50% -10%, #1e293b, transparent);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── HEADER ─── */
        header {
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            position: relative;
        }
        .brand {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .brand span { color: #f87171; -webkit-text-fill-color: #f87171; }
        .meta-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .pill {
            font-size: 0.8rem;
            padding: 0.35rem 0.9rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--muted);
        }
        .pill.countdown {
            color: #fbbf24;
            background: rgba(251,191,36,0.08);
            border-color: rgba(251,191,36,0.2);
            font-weight: 600;
        }
        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1.6rem;
            border-radius: 50px;
            background: linear-gradient(135deg, #ef4444, #f97316);
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 0 24px rgba(239,68,68,0.25);
            transition: all 0.3s ease;
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 36px rgba(239,68,68,0.45); }

        /* ─── TABS ─── */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0 2rem 2rem;
        }
        .tab-btn {
            padding: 0.5rem 1.4rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* ─── MAIN ─── */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ─── STOCK GRID ─── */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(.175,.885,.32,1.275), border-color 0.3s, box-shadow 0.3s;
            cursor: default;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 80% 10%, var(--rc, transparent), transparent 65%);
            opacity: 0.12;
            pointer-events: none;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--border-hover);
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
        }
        .card:hover .fruit-img { transform: scale(1.08) rotate(-2deg); }

        .rarity-badge {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            background: var(--rc, #555);
            box-shadow: 0 0 14px var(--rc, transparent);
            color: #fff;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .fruit-img-wrap { width: 140px; height: 140px; margin-bottom: 0.8rem; position: relative; z-index: 1; }
        .fruit-img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.35s ease; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4)); }
        .fruit-name { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.2rem; position: relative; z-index: 1; }
        .fruit-type { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; position: relative; z-index: 1; }
        .prices { display: flex; gap: 0.6rem; width: 100%; margin-top: auto; position: relative; z-index: 1; }
        .price-box {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .price-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .price-val { font-size: 0.9rem; font-weight: 700; }
        .beli { color: #4ade80; }
        .robux { color: #60a5fa; }

        /* Rarity color bindings */
        .rc-common    { --rc: var(--common); }
        .rc-uncommon  { --rc: var(--uncommon); }
        .rc-rare      { --rc: var(--rare); }
        .rc-legendary { --rc: var(--legendary); }
        .rc-mythical  { --rc: var(--mythical); }

        /* ─── SKELETON ─── */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
        }
        .skeleton-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .sk { background: rgba(255,255,255,0.06); border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
        .sk-badge { width: 70px; height: 20px; border-radius: 50px; }
        .sk-img { width: 120px; height: 120px; border-radius: 12px; }
        .sk-name { width: 100px; height: 22px; }
        .sk-type { width: 70px; height: 14px; }
        .sk-prices { display: flex; gap: 0.6rem; width: 100%; }
        .sk-price { flex: 1; height: 44px; border-radius: 10px; }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* ─── HISTORY ─── */
        .history-list { display: flex; flex-direction: column; gap: 1rem; }
        .history-row {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .history-meta { display: flex; justify-content: space-between; align-items: center; }
        .history-date { font-size: 0.8rem; color: var(--muted); }
        .history-fruits { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .history-tag {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.65rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            color: var(--text);
        }

        /* ─── FOOTER ─── */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.75rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
            line-height: 1.8;
        }
        footer a { color: var(--muted); }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 600px) {
            .brand { font-size: 2.5rem; }
            .container { padding: 0 1rem 3rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">BF<span>Stock</span></div>
    <div class="meta-row">
        <div class="pill" id="update-time">Đang tải...</div>
        <div class="pill countdown" id="countdown">⏱ --h --m --s</div>
        <a href="https://www.roblox.com/games/2753915549/" target="_blank" class="play-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8,5.14V19.14L19,12.14Z"/></svg>
            Play Now
        </a>
    </div>
</header>

<div class="tabs">
    <button class="tab-btn active" data-tab="stock">📦 Stock hiện tại</button>
    <button class="tab-btn" data-tab="history">📜 Lịch sử</button>
</div>

<div class="container">
    <!-- STOCK TAB -->
    <div id="tab-stock" class="tab-panel active">
        <div id="skeleton" class="skeleton-grid">
            <!-- Skeleton cards -->
            <div class="skeleton-card"><div class="sk sk-badge"></div><div class="sk sk-img"></div><div class="sk sk-name"></div><div class="sk sk-type"></div><div class="sk-prices"><div class="sk sk-price"></div><div class="sk sk-price"></div></div></div>
            <div class="skeleton-card"><div class="sk sk-badge"></div><div class="sk sk-img"></div><div class="sk sk-name"></div><div class="sk sk-type"></div><div class="sk-prices"><div class="sk sk-price"></div><div class="sk sk-price"></div></div></div>
            <div class="skeleton-card"><div class="sk sk-badge"></div><div class="sk sk-img"></div><div class="sk sk-name"></div><div class="sk sk-type"></div><div class="sk-prices"><div class="sk sk-price"></div><div class="sk sk-price"></div></div></div>
            <div class="skeleton-card"><div class="sk sk-badge"></div><div class="sk sk-img"></div><div class="sk sk-name"></div><div class="sk sk-type"></div><div class="sk-prices"><div class="sk sk-price"></div><div class="sk sk-price"></div></div></div>
        </div>
        <div id="stock-grid" class="stock-grid" style="display:none;"></div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="tab-panel">
        <div id="history-list" class="history-list">
            <div class="pill" style="text-align:center;padding:2rem;">Đang tải lịch sử...</div>
        </div>
    </div>
</div>

<footer>
    <p>BFStock là công cụ fan-made, không liên kết với Gamer Robot Inc hay Roblox Corporation.</p>
    <p>Dữ liệu được cập nhật tự động từ <a href="https://blox-fruits.fandom.com/wiki/Blox_Fruits_%22Stock%22" target="_blank">Blox Fruits Wiki</a>.</p>
</footer>

<script>
    // ─── TABS ───
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            if (btn.dataset.tab === 'history') loadHistory();
        });
    });

    // ─── RARITY COLOR MAP ───
    const RC = {
        common: 'rc-common', uncommon: 'rc-uncommon',
        rare: 'rc-rare', legendary: 'rc-legendary', mythical: 'rc-mythical'
    };

    // ─── COUNTDOWN ───
    let lastUpdated = '';

    function getNextReset() {
        const now = new Date();
        const h = now.getUTCHours();
        const nextH = Math.ceil((h + 0.001) / 4) * 4;
        const next = new Date(now);
        next.setUTCHours(nextH, 0, 0, 0);
        return next;
    }

    function tickCountdown() {
        const diff = getNextReset() - Date.now();
        if (diff <= 0) {
            document.getElementById('countdown').textContent = '⏱ Đang cập nhật...';
            setTimeout(loadStock, 15000);
            return;
        }
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('countdown').textContent = `⏱ Reset sau ${h}h ${m}m ${s}s`;

        // Smart polling: khi còn <90s thì check mỗi 20s
        if (diff < 90000) {
            if (!window._fastPoll) window._fastPoll = setInterval(loadStock, 20000);
        } else {
            if (window._fastPoll) { clearInterval(window._fastPoll); window._fastPoll = null; }
        }
    }
    setInterval(tickCountdown, 1000);

    // ─── LOAD STOCK ───
    async function loadStock() {
        try {
            const res = await fetch('data/stock.json?t=' + Date.now());
            const data = await res.json();
            if (data.updated === lastUpdated) return;
            lastUpdated = data.updated;

            const d = new Date(data.updated);
            document.getElementById('update-time').textContent = '🕒 ' + d.toLocaleString('vi-VN');

            const grid = document.getElementById('stock-grid');
            grid.innerHTML = '';
            data.stock.forEach(f => {
                const rc = RC[f.rarity.toLowerCase()] || '';
                const beli = new Intl.NumberFormat('vi-VN').format(f.price);
                const robux = new Intl.NumberFormat('en-US').format(f.robux);
                grid.innerHTML += `
                <div class="card ${rc}">
                    <span class="rarity-badge">${f.rarity}</span>
                    <div class="fruit-img-wrap">
                        <img class="fruit-img" src="assets/fruits/${f.name}.webp" alt="${f.name}"
                             onerror="this.style.opacity=0.3">
                    </div>
                    <div class="fruit-name">${f.name}</div>
                    <div class="fruit-type">${f.type} Type</div>
                    <div class="prices">
                        <div class="price-box">
                            <span class="price-label">Beli</span>
                            <span class="price-val beli">${beli}</span>
                        </div>
                        <div class="price-box">
                            <span class="price-label">Robux</span>
                            <span class="price-val robux">${robux}</span>
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('skeleton').style.display = 'none';
            grid.style.display = 'grid';
        } catch(e) {
            console.error(e);
        }
    }

    // ─── LOAD HISTORY ───
    let historyLoaded = false;
    async function loadHistory() {
        if (historyLoaded) return;
        try {
            const res = await fetch('data/history.json?t=' + Date.now());
            const data = await res.json();
            const el = document.getElementById('history-list');
            el.innerHTML = '';
            // Hiển thị từ mới nhất → cũ nhất
            [...data].reverse().slice(0, 30).forEach(entry => {
                const d = new Date(entry.updated);
                const dateStr = d.toLocaleString('vi-VN');
                const fruits = entry.stock.map(f => {
                    const rc = RC[f.rarity.toLowerCase()] || '';
                    return `<span class="history-tag ${rc}" style="border-color:var(--rc,var(--border))">${f.name}</span>`;
                }).join('');
                el.innerHTML += `
                <div class="history-row">
                    <div class="history-meta">
                        <span class="history-date">🕒 ${dateStr}</span>
                    </div>
                    <div class="history-fruits">${fruits}</div>
                </div>`;
            });
            historyLoaded = true;
        } catch(e) {
            document.getElementById('history-list').innerHTML =
                '<div class="pill" style="text-align:center;padding:2rem;color:#f87171;">Chưa có dữ liệu lịch sử. Sẽ có sau vài lần cập nhật.</div>';
        }
    }

    loadStock();
</script>
</body>
</html>
